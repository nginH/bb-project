name: Deploy to Cloud Run

on:
    push:
        branches:
            - main

environment:
    name: production

jobs:
    build-and-deploy-frontend:
        runs-on: ubuntu-latest
        environment:
            name: production
        defaults:
            run:
                working-directory: frontend/my-app
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Authenticate to Google Cloud
              uses: google-github-actions/auth@v2
              with:
                  credentials_json: ${{ secrets.GCP_SA_KEY }}

            - name: Configure Docker for Artifact Registry
              run: gcloud auth configure-docker asia-south1-docker.pkg.dev

            - name: Create .env file from secrets
              run: |
                  echo "NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}" >> .env
                  echo "NEXT_PUBLIC_OTHER_SECRET=${{ secrets.NEXT_PUBLIC_OTHER_SECRET }}" >> .env

            - name: Build and push Docker image (frontend)
              run: |
                  docker build -t asia-south1-docker.pkg.dev/bb-project-494105/frontentrepo/frontend:latest .
                  docker push asia-south1-docker.pkg.dev/bb-project-494105/frontentrepo/frontend:latest

            - name: Deploy to Cloud Run (frontend)
              run: |
                  gcloud run deploy frontend-service \
                    --image=asia-south1-docker.pkg.dev/bb-project-494105/frontentrepo/frontend:latest \
                    --region=asia-south1 \
                    --platform=managed \
                    --allow-unauthenticated

    build-and-deploy-backend:
        runs-on: ubuntu-latest
        environment:
            name: production
        defaults:
            run:
                working-directory: backend
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Authenticate to Google Cloud
              uses: google-github-actions/auth@v2
              with:
                  credentials_json: ${{ secrets.GCP_SA_KEY }}

            - name: Configure Docker for Artifact Registry
              run: gcloud auth configure-docker asia-south1-docker.pkg.dev

            - name: Create .env file from secrets
              run: |
                  echo "API_URL=${{ secrets.API_URL }}" >> .env
                  echo "OTHER_SECRET=${{ secrets.OTHER_SECRET }}" >> .env

            - name: Build and push Docker image (backend)
              run: |
                  docker build -t asia-south1-docker.pkg.dev/bb-project-494105/backend-repo/backend:latest .
                  docker push asia-south1-docker.pkg.dev/bb-project-494105/backend-repo/backend:latest

            - name: Deploy to Cloud Run (backend)
              run: |
                  gcloud run deploy backend-service \
                    --image=asia-south1-docker.pkg.dev/bb-project-494105/backend-repo/backend:latest \
                    --region=asia-south1 \
                    --platform=managed \
                    --allow-unauthenticated
