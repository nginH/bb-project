name: Deploy to Cloud Run

on:
  push:
    branches:
      - main
jobs:
  build-and-deploy-frontend:
    runs-on: ubuntu-latest
    environment:
      name: prod
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker asia-south1-docker.pkg.dev

      - name: Create .env file from secrets
        working-directory: frontend/
        run: |
          echo "NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}" >> .env
          echo "NEXT_PUBLIC_OTHER_SECRET=${{ secrets.NEXT_PUBLIC_OTHER_SECRET }}" >> .env

      - name: Build and push Docker image (frontend)
        uses: docker/build-push-action@v5
        with:
          context: frontend/
          push: true
          tags: asia-south1-docker.pkg.dev/bb-project-494105/frontentrepo/frontend:latest

      - name: Deploy to Cloud Run (frontend)
        run: |
          gcloud run deploy frontend-service \
            --image=asia-south1-docker.pkg.dev/bb-project-494105/frontentrepo/frontend:latest \
            --region=asia-south1 \
            --platform=managed \
            --allow-unauthenticated

  build-and-deploy-backend:
    runs-on: ubuntu-latest
    environment:
      name: prod
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker asia-south1-docker.pkg.dev

      - name: Create .env file from secrets
        working-directory: backend
        run: |
          echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" >> .env
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> .env
          echo "DATABASE_URL=${{ secrets.DATABASE_URL }}" >> .env
          echo "PINECONE_API_KEY=${{ secrets.PINECONE_API_KEY }}" >> .env
          echo "PINECONE_INDEX=${{ secrets.PINECONE_INDEX }}" >> .env

      - name: Build and push Docker image (backend)
        uses: docker/build-push-action@v5
        with:
          context: backend
          push: true
          tags: asia-south1-docker.pkg.dev/bb-project-494105/backend-repo/backend:latest

      - name: Deploy to Cloud Run (backend)
        run: |
          gcloud run deploy backend-service \
            --image=asia-south1-docker.pkg.dev/bb-project-494105/backend-repo/backend:latest \
            --region=asia-south1 \
            --platform=managed \
            --allow-unauthenticated \
            --set-env-vars="OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }},GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }},DATABASE_URL=${{ secrets.DATABASE_URL }},PINECONE_API_KEY=${{ secrets.PINECONE_API_KEY }},PINECONE_INDEX=${{ secrets.PINECONE_INDEX }}"
